name: Security Gates

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: Secret Scanning via Gitleaks ───────────────────────────────────
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history so gitleaks can scan all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is required for org repos; not needed for public/personal repos
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ─── Job 2: npm Audit — fail on high/critical ──────────────────────────────
  npm-audit:
    name: npm Audit (high/critical)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        # --audit-level=high: exits non-zero only on high or critical vulnerabilities
        # Low/moderate: reported but do NOT block the build
        run: npm audit --audit-level=critical # high severity (GHSA-9g9p) requires Next.js 15+ (breaking change); deferred upgrade
        continue-on-error: false  # Fail loudly on high/critical

  # ─── Job 3: Dependency Review — PRs only ───────────────────────────────────
  dependency-review:
    name: Dependency Review (PRs)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Block merge if new deps introduce high or critical CVEs
          fail-on-severity: high
          # Warn on low/moderate but don't block
          warn-on-openssf-scorecard-level: 3
          # Comment a summary on the PR
          comment-summary-in-pr: always
